<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSoC Edge 8-Way Radar</title>
    <style>
        * { box-sizing: border-box; }

        body {
            background: #ffffff;
            color: #1a1a1a;
            font-family: "Segoe UI", system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #toolbar {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 100;
        }

        button {
            padding: 12px 20px;
            font-size: 15px;
            cursor: pointer;
            background: #e30000;
            color: #fff;
            border: none;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(227, 0, 0, 0.25);
        }

        button:hover { background: #c40000; }

        button.secondary {
            background: #fff;
            color: #e30000;
            border: 2px solid #e30000;
        }

        label.toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            background: #fff;
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        #statusLine {
            position: absolute;
            top: 72px;
            font-size: 14px;
            color: #888;
        }

        #radarWrap {
            position: relative;
            width: min(85vmin, 520px);
            height: min(85vmin, 520px);
        }

        /* Radar-Ring (ohne Heatmap) */
        #radarRing {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid #e30000;
            background: #fafafa;
            box-shadow: inset 0 0 24px rgba(227, 0, 0, 0.06);
        }

        #ringLabels {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .dir-label {
            position: absolute;
            font-size: 11px;
            font-weight: 700;
            color: #e30000;
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }

        #pointer {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 42%;
            background: linear-gradient(to top, rgba(227,0,0,0.15), #e30000);
            transform-origin: bottom center;
            margin-left: -2.5px;
            margin-top: -42%;
            border-radius: 3px;
            will-change: transform;
            z-index: 10;
        }

        #hub {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 18px;
            height: 18px;
            margin: -9px 0 0 -9px;
            background: #e30000;
            border: 3px solid #fff;
            border-radius: 50%;
            z-index: 11;
            box-shadow: 0 0 0 2px #e30000;
        }

        #angleText {
            position: absolute;
            bottom: -52px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 26px;
            font-weight: 800;
            color: #e30000;
            white-space: nowrap;
        }

        #debug {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(20, 20, 20, 0.92);
            color: #6f6;
            padding: 12px 14px;
            font-family: Consolas, monospace;
            font-size: 12px;
            text-align: left;
            border-radius: 8px;
            max-width: min(420px, 92vw);
            z-index: 100;
            line-height: 1.45;
        }

        #scoreBars {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(255,255,255,0.96);
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 11px;
            min-width: 150px;
            z-index: 100;
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 3px 0;
        }

        .bar-row span:first-child {
            width: 30px;
            text-transform: uppercase;
            color: #888;
            font-weight: 600;
            font-size: 10px;
        }

        .bar-track {
            flex: 1;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: #e30000;
            width: 0%;
            transition: width 0.35s ease-out;
        }

        .bar-row span:last-child {
            width: 38px;
            text-align: right;
            color: #333;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <button type="button" id="connectBtn">Mit PSoC verbinden</button>
        <button type="button" id="clearBtn" class="secondary">Reset</button>
    </div>

    <div id="statusLine">Chrome/Edge · 115200 · Web Serial</div>

    <div id="radarWrap">
        <div id="radarRing"></div>
        <div id="ringLabels"></div>
        <div id="pointer"></div>
        <div id="hub"></div>
        <div id="angleText">Bereit</div>
    </div>

    <div id="debug">Warte auf Verbindung…</div>
    <div id="scoreBars"></div>

    <script>
        const LABELS = [
            "north", "northeast", "east", "southeast",
            "south", "southwest", "west", "northwest"
        ];

        const DIRECTIONS = {
            north: 0, northeast: 45, east: 90, southeast: 135,
            south: 180, southwest: 225, west: 270, northwest: 315
        };

        const IGNORE = new Set(["noise", "unlabeled"]);

        // WICHTIG: längste Labels zuerst!
        const LABEL_PATTERN = "(northwest|northeast|southeast|southwest|north|east|south|west)";

        let currentScores = Object.fromEntries(LABELS.map(k => [k, 0]));
        let displayScores = Object.fromEntries(LABELS.map(k => [k, 0]));
        let displayAngle = 0;
        const debugEl = document.getElementById("debug");

        // Kleiner = weicher / träger Pfeil
        const SCORE_SMOOTH = 0.14;
        const ANGLE_SMOOTH = 0.10;
        const SCORE_THRESHOLD = 0.18;

        function log(msg) {
            debugEl.textContent = "> " + msg;
        }

        // Board/Modell: gespiegelte Richtungen korrigieren
        function fixLabel(label) {
            const swap = {
                east: "west",
                west: "east",
                northeast: "northwest",
                northwest: "northeast",
                southeast: "southwest",
                southwest: "southeast"
            };
            return swap[label] || label;
        }

        function decayScores(factor) {
            for (const k of LABELS) currentScores[k] *= factor;
        }

        function applyScore(label, score) {
            if (IGNORE.has(label) || !LABELS.includes(label)) return;
            label = fixLabel(label);
            decayScores(0.88);
            currentScores[label] = Math.max(currentScores[label], score);
        }

        function lerpShortestAngle(from, to, t) {
            let diff = ((to - from + 540) % 360) - 180;
            return (from + diff * t + 360) % 360;
        }

        function computeAngleAndLabel(scores) {
            let sinSum = 0, cosSum = 0, maxScore = 0, bestLabel = "";

            for (const d of LABELS) {
                const s = scores[d];
                if (s > maxScore) { maxScore = s; bestLabel = d; }
                const rad = DIRECTIONS[d] * Math.PI / 180;
                sinSum += Math.sin(rad) * s;
                cosSum += Math.cos(rad) * s;
            }

            if (maxScore < SCORE_THRESHOLD) {
                return { angle: displayAngle, label: "", maxScore: 0 };
            }

            const angle = (Math.atan2(sinSum, cosSum) * 180 / Math.PI + 360) % 360;
            return { angle, label: bestLabel, maxScore };
        }

        function renderFrame() {
            for (const k of LABELS) {
                displayScores[k] += (currentScores[k] - displayScores[k]) * SCORE_SMOOTH;
            }

            const { angle, label, maxScore } = computeAngleAndLabel(displayScores);

            if (maxScore >= SCORE_THRESHOLD) {
                displayAngle = lerpShortestAngle(displayAngle, angle, ANGLE_SMOOTH);
                document.getElementById("pointer").style.transform =
                    "rotate(" + displayAngle.toFixed(2) + "deg)";
                document.getElementById("angleText").textContent =
                    label.toUpperCase() + " · " + Math.round(displayAngle) + "°";
            } else {
                document.getElementById("angleText").textContent = "—";
            }

            updateScoreBarsFrom(displayScores);
        }

        function startSmoothLoop() {
            function tick() {
                renderFrame();
                requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        }

        function parseLine(line) {
            line = line.trim().toLowerCase();
            if (!line) return;

            // Neu: north:0.85
            let m = line.match(new RegExp("^" + LABEL_PATTERN + ":([0-9.]+)$"));
            if (m) {
                applyScore(m[1], parseFloat(m[2]));
                return;
            }

            // Alt: label: north : score: 0.2148
            m = line.match(new RegExp("label:\\s*" + LABEL_PATTERN + "\\s*:?\\s*score:?\\s*([0-9.]+)"));
            if (m) {
                applyScore(m[1], parseFloat(m[2]));
                return;
            }

            // Alt: Output: north
            m = line.match(/^output:\s*(northwest|northeast|southeast|southwest|north|east|south|west)/);
            if (m) applyScore(m[1], 0.75);
        }

        function updateScoreBarsFrom(scores) {
            const root = document.getElementById("scoreBars");
            root.innerHTML = "<strong style='color:#e30000'>Scores</strong>";
            for (const d of LABELS) {
                const pct = Math.min(100, scores[d] * 100);
                const row = document.createElement("div");
                row.className = "bar-row";
                row.innerHTML =
                    "<span>" + d.slice(0, 3) + "</span>" +
                    "<div class='bar-track'><div class='bar-fill' style='width:" + pct + "%'></div></div>" +
                    "<span>" + scores[d].toFixed(2) + "</span>";
                root.appendChild(row);
            }
        }

        function updateUI() {
            renderFrame();
        }

        function buildRingLabels() {
            const root = document.getElementById("ringLabels");
            const r = 46;
            const short = {
                north: "N", northeast: "NO", east: "O", southeast: "SO",
                south: "S", southwest: "SW", west: "W", northwest: "NW"
            };
            for (const d of LABELS) {
                const rad = (DIRECTIONS[d] - 90) * Math.PI / 180;
                const el = document.createElement("div");
                el.className = "dir-label";
                el.style.left = (50 + r * Math.cos(rad)) + "%";
                el.style.top = (50 + r * Math.sin(rad)) + "%";
                el.textContent = short[d];
                root.appendChild(el);
            }
        }

        async function connect() {
            if (!("serial" in navigator)) {
                log("Web Serial nur in Chrome/Edge!");
                return;
            }
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                log("Verbunden — warte auf UART…");

                const reader = port.readable
                    .pipeThrough(new TextDecoderStream())
                    .getReader();

                let buffer = "";
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += value;
                    const lines = buffer.split(/\r?\n/);
                    buffer = lines.pop() || "";
                    for (const line of lines) {
                        if (line.trim()) log(line.trim());
                        parseLine(line);
                    }
                }
            } catch (err) {
                log("Fehler: " + err.message);
            }
        }

        function resetScores() {
            currentScores = Object.fromEntries(LABELS.map(k => [k, 0]));
            displayScores = Object.fromEntries(LABELS.map(k => [k, 0]));
            displayAngle = 0;
            document.getElementById("pointer").style.transform = "rotate(0deg)";
            document.getElementById("angleText").textContent = "Bereit";
            updateUI();
            log("Reset");
        }

        document.getElementById("connectBtn").addEventListener("click", connect);
        document.getElementById("clearBtn").addEventListener("click", resetScores);

        buildRingLabels();
        startSmoothLoop();
        updateUI();
    </script>
</body>
</html>
